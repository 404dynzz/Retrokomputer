server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    # Frontend Single Page App routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API routes to PHP-FPM container
    location ~ ^/api/ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        
        # Point to Laravel public index.php inside backend container
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Serve stored user uploads (shared storage volume)
    location /storage/ {
        alias /var/www/html/public/storage/;
        try_files $uri =404;
    }
}
